<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetalTrack Horizon | Elite Market Command</title>
    <!-- TradingView Script -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0a;
            --panel-glass: rgba(20, 20, 22, 0.85);
            --accent-silver: #b0b4b8;
            --accent-light: #e0e4e8;
            --text-main: #d4d4d4;
            --text-dim: #7a7a7a;
            --border: #262626;
            --border-hover: #3a3a3a;
            --gain: #4a8a65;
            --loss: #b35959;
            --hover-bg: rgba(255, 255, 255, 0.03);
            --active-bg: rgba(255, 255, 255, 0.06);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at top right, #141414, transparent 60%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Left */
        #left-sidebar {
            width: 320px;
            background: var(--panel-glass);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .brand {
            padding: 25px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--accent-light);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .currency-select {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            color: var(--accent-silver);
            padding: 4px 8px;
            border-radius: 4px;
            font-family: 'Orbitron';
            font-size: 0.75rem;
            outline: none;
            cursor: pointer;
        }

        #search-container { padding: 15px; }
        #asset-search {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            color: var(--accent-light);
            padding: 10px 15px;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s;
        }
        #asset-search:focus { border-color: var(--accent-silver); }

        .asset-list { flex-grow: 1; overflow-y: auto; padding: 10px; overflow-x: hidden; }
        
        @keyframes slideIn {
            0% { opacity: 0; transform: translateX(-20px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .asset-item {
            padding: 12px 15px;
            margin-bottom: 4px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            border: 1px solid transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            /* Animation triggered in JS */
        }
        .asset-item:hover { background: var(--hover-bg); border-color: var(--border-hover); }
        .asset-item.active { 
            background: var(--active-bg); 
            border-color: var(--border-hover);
            border-left: 3px solid var(--accent-silver);
        }

        .symbol { font-family: 'Orbitron'; font-weight: 600; color: var(--accent-light); font-size: 0.95rem; }
        .price-val { font-weight: 500; font-size: 0.95rem; }
        .change-pct { font-size: 0.75rem; margin-top: 2px; }

        /* Main Viewport */
        #main-viewport {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 0;
            position: relative;
            background: #000;
        }

        #chart-frame {
            width: 100%;
            height: 100%;
            border-radius: 0;
        }
        
        /* AI Assistant Sidebar */
        #ai-sidebar {
            width: 380px;
            background: var(--panel-glass);
            backdrop-filter: blur(10px);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: -5px 0 20px rgba(0,0,0,0.5);
        }

        .panel-title {
            font-family: 'Orbitron';
            font-size: 0.9rem;
            margin-bottom: 20px;
            color: var(--accent-silver);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
            letter-spacing: 1px;
        }

        .ai-chat-box {
            flex-grow: 1;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .ai-input-group {
            margin-top: 15px;
            display: flex;
            gap: 8px;
        }

        .btn-silver {
            background: transparent;
            border: 1px solid var(--border-hover);
            color: var(--accent-silver);
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Orbitron';
            font-size: 0.75rem;
            text-transform: uppercase;
            transition: all 0.3s;
            width: 100%;
            letter-spacing: 1px;
        }
        .btn-silver:hover { background: rgba(255,255,255,0.05); color: #fff; border-color: var(--accent-silver); }

        .settings-icon { cursor: pointer; color: var(--text-dim); transition: 0.3s; }
        .settings-icon:hover { color: var(--accent-light); }

        /* Tech Metrics */
        .metrics-wrapper {
            margin-bottom: 20px;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .metric-card {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }
        .metric-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px;}
        .metric-value { font-family: 'Inter'; font-weight: 500; font-size: 0.85rem; color: var(--accent-light);}

        /* Scrollbars */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--bg-deep); padding: 30px; border-radius: 8px; border: 1px solid var(--border-hover);
            width: 350px; text-align: center;
        }

        .positive { color: var(--gain); }
        .negative { color: var(--loss); }

        /* Current Selection Display */
        #active-info-panel {
            padding: 10px 0;
        }
        #active-name { font-size: 1.1rem; font-weight: 500; color: #fff; margin-bottom: 5px;}
        #active-symbol-tag { font-family: 'Orbitron'; font-size: 0.75rem; color: var(--text-dim); }
    </style>
</head>
<body>

    <!-- API Key Modal -->
    <div id="api-modal" class="modal">
        <div class="modal-content">
            <h3 style="font-family: 'Orbitron'; font-size: 1rem; color: var(--accent-light); margin-top: 0;">OpenAI Intelligence</h3>
            <p style="font-size: 0.75rem; color: var(--text-dim); line-height: 1.5;">Enter API key to unlock market analysis. Key is stored locally via browser sessions.</p>
            <input type="password" id="api-key-input" placeholder="sk-..." style="width: 100%; padding: 10px; margin: 15px 0; border-radius: 4px; border: 1px solid var(--border); background: #000; color: #fff; outline: none;">
            <button class="btn-silver" onclick="saveKey()">Initialize</button>
        </div>
    </div>

    <div id="left-sidebar">
        <div class="brand">
            <div>
                <span style="display:inline-block; width:8px; height:8px; background:var(--accent-silver); border-radius:50%; margin-right:5px;"></span>
                HORIZON
            </div>
            <select id="currency-selector" class="currency-select" onchange="changeCurrency()">
                <option value="USD">USD ($)</option>
                <option value="INR">INR (₹)</option>
                <option value="EUR">EUR (€)</option>
            </select>
        </div>
        <div id="search-container">
            <input type="text" id="asset-search" placeholder="Search Markets...">
        </div>
        <div class="asset-list" id="asset-list">
            <!-- Staggered Items -->
        </div>
    </div>

    <div id="main-viewport">
        <!-- TradingView Advanced Chart -->
        <div id="chart-frame"></div>
    </div>

    <div id="ai-sidebar">
        <div class="panel-title">
            <span>MARKET INTELLIGENCE</span>
            <span class="settings-icon" onclick="showModal()">⚙</span>
        </div>

        <div id="active-info-panel">
            <div id="active-name">Loading...</div>
            <div id="active-symbol-tag">-</div>
        </div>

        <div class="metrics-wrapper">
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">1W Return</div>
                    <div id="m-1w" class="metric-value">-</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">1Y Return</div>
                    <div id="m-1y" class="metric-value">-</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">20D SMA</div>
                    <div id="m-sma20" class="metric-value">-</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">50D SMA</div>
                    <div id="m-sma50" class="metric-value">-</div>
                </div>
            </div>
        </div>

        <div id="ai-chat" class="ai-chat-box">
            Awaiting selection to compile market insight.
        </div>

        <div class="ai-input-group">
            <button class="btn-silver" onclick="getAIReview()">Commence Analysis</button>
        </div>
    </div>

    <script>
        // Data & State Configuration
        let currentAssetData = null;
        let currentTicker = "GC=F"; // Default to gold instantly
        
        let fxRates = { USD: 1, INR: 83.0, EUR: 0.92 }; // Defaults, updated via API
        let currentCurrency = 'USD';
        
        const CACHE_BUST = new Date().getTime(); // Prevent gh-pages caching issues

        const FALLBACK_TICKERS = [
            {ticker: "GC=F", name: "Gold", price: 0, change1d: 0}, {ticker: "SI=F", name: "Silver", price: 0, change1d: 0},
            {ticker: "PL=F", name: "Platinum", price: 0, change1d: 0}, {ticker: "PA=F", name: "Palladium", price: 0, change1d: 0},
            {ticker: "HG=F", name: "Copper", price: 0, change1d: 0}, {ticker: "GLD", name: "SPDR Gold Trust", price: 0, change1d: 0},
            {ticker: "SLV", name: "iShares Silver Trust", price: 0, change1d: 0}, {ticker: "PPLT", name: "Physical Platinum", price: 0, change1d: 0},
            {ticker: "PALL", name: "Physical Palladium", price: 0, change1d: 0}, {ticker: "CPER", name: "Copper Index", price: 0, change1d: 0},
            {ticker: "LIT", name: "Global X Lithium ETF", price: 0, change1d: 0}, {ticker: "REMX", name: "Rare Earth/Strategic Metals", price: 0, change1d: 0},
            {ticker: "BATT", name: "Lithium & Battery Tech", price: 0, change1d: 0}, {ticker: "URA", name: "Global X Uranium ETF", price: 0, change1d: 0},
            {ticker: "COPX", name: "Global X Copper Miners", price: 0, change1d: 0}, {ticker: "SIL", name: "Silver Miners ETF", price: 0, change1d: 0},
            {ticker: "SILJ", name: "Junior Silver Miners", price: 0, change1d: 0}, {ticker: "GDX", name: "Gold Miners ETF", price: 0, change1d: 0},
            {ticker: "GDXJ", name: "Junior Gold Miners", price: 0, change1d: 0}, {ticker: "PICK", name: "Global Metals Producers", price: 0, change1d: 0},
            {ticker: "XME", name: "SPDR Metals & Mining", price: 0, change1d: 0}, {ticker: "DBB", name: "Invesco Base Metals", price: 0, change1d: 0},
            {ticker: "FCX", name: "Freeport-McMoRan", price: 0, change1d: 0}, {ticker: "BHP", name: "BHP Group", price: 0, change1d: 0},
            {ticker: "RIO", name: "Rio Tinto", price: 0, change1d: 0}, {ticker: "VALE", name: "Vale S.A.", price: 0, change1d: 0},
            {ticker: "AA", name: "Alcoa Corporation", price: 0, change1d: 0}, {ticker: "NEM", name: "Newmont Corporation", price: 0, change1d: 0},
            {ticker: "GOLD", name: "Barrick Gold Corp", price: 0, change1d: 0}, {ticker: "SCCO", name: "Southern Copper", price: 0, change1d: 0},
            {ticker: "AEM", name: "Agnico Eagle Mines", price: 0, change1d: 0}, {ticker: "WPM", name: "Wheaton Precious Metals", price: 0, change1d: 0},
            {ticker: "FNV", name: "Franco-Nevada", price: 0, change1d: 0}, {ticker: "KGC", name: "Kinross Gold", price: 0, change1d: 0},
            {ticker: "AU", name: "AngloGold Ashanti", price: 0, change1d: 0}, {ticker: "GFI", name: "Gold Fields", price: 0, change1d: 0},
            {ticker: "PAAS", name: "Pan American Silver", price: 0, change1d: 0}, {ticker: "SSRM", name: "SSR Mining", price: 0, change1d: 0},
            {ticker: "CDE", name: "Coeur Mining", price: 0, change1d: 0}, {ticker: "AGI", name: "Alamos Gold", price: 0, change1d: 0},
            {ticker: "RGLD", name: "Royal Gold", price: 0, change1d: 0}, {ticker: "SAND", name: "Sandstorm Gold", price: 0, change1d: 0},
            {ticker: "OR", name: "Osisko Gold Royalties", price: 0, change1d: 0}, {ticker: "MP", name: "MP Materials", price: 0, change1d: 0},
            {ticker: "CLF", name: "Cleveland-Cliffs", price: 0, change1d: 0}, {ticker: "X", name: "United States Steel", price: 0, change1d: 0},
            {ticker: "TECK", name: "Teck Resources", price: 0, change1d: 0}, {ticker: "HMY", name: "Harmony Gold", price: 0, change1d: 0},
            {ticker: "EGO", name: "Eldorado Gold", price: 0, change1d: 0}, {ticker: "IAG", name: "IAMGOLD Corporation", price: 0, change1d: 0}
        ];

        // Map Yahoo Finance to TradingView
        const tvSymbolMap = {
            "GC=F": "COMEX:GC1!", "SI=F": "COMEX:SI1!", "PL=F": "NYMEX:PL1!", "PA=F": "NYMEX:PA1!", "HG=F": "COMEX:HG1!",
            "GLD": "AMEX:GLD", "SLV": "AMEX:SLV", "PPLT": "AMEX:PPLT", "PALL": "AMEX:PALL", "CPER": "AMEX:CPER",
            "LIT": "AMEX:LIT", "REMX": "AMEX:REMX", "BATT": "AMEX:BATT", "URA": "AMEX:URA", "COPX": "AMEX:COPX",
            "SIL": "AMEX:SIL", "SILJ": "AMEX:SILJ", "GDX": "AMEX:GDX", "GDXJ": "AMEX:GDXJ", "PICK": "AMEX:PICK",
            "XME": "AMEX:XME", "DBB": "AMEX:DBB", "JJCTF": "OTC:JJCTF", "FCX": "NYSE:FCX", "BHP": "NYSE:BHP",
            "RIO": "NYSE:RIO", "VALE": "NYSE:VALE", "AA": "NYSE:AA", "NEM": "NYSE:NEM", "GOLD": "NYSE:GOLD",
            "GLNCY": "OTC:GLNCY", "SCCO": "NYSE:SCCO", "AEM": "NYSE:AEM", "WPM": "NYSE:WPM", "FNV": "NYSE:FNV",
            "KGC": "NYSE:KGC", "AU": "NYSE:AU", "GFI": "NYSE:GFI", "PAAS": "NASDAQ:PAAS", "SSRM": "NASDAQ:SSRM",
            "CDE": "NYSE:CDE", "AGI": "NYSE:AGI", "RGLD": "NASDAQ:RGLD", "SAND": "NYSE:SAND", "OR": "NYSE:OR",
            "MP": "NYSE:MP", "CLF": "NYSE:CLF", "X": "NYSE:X", "TECK": "NYSE:TECK", "HMY": "NYSE:HMY", 
            "EGO": "NYSE:EGO", "IAG": "NYSE:IAG"
        };
        
        const currencySymbols = { USD: '$', INR: '₹', EUR: '€' };

        function getTvSymbol(t) { return tvSymbolMap[t] || t.replace('=F', '1!'); }
        function formatPrice(val) {
            if (!val || isNaN(val)) return 'N/A';
            const converted = val * fxRates[currentCurrency];
            return `${currencySymbols[currentCurrency]}${converted.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        }

        async function fetchExchangeRates() {
            try {
                const res = await fetch("https://api.exchangerate-api.com/v4/latest/USD");
                const data = await res.json();
                if(data && data.rates) {
                    fxRates.INR = data.rates.INR;
                    fxRates.EUR = data.rates.EUR;
                }
            } catch(e) {
                console.warn("Forex fetch failed, using fallback static rates.");
            }
        }

        async function loadAssetList() {
            let assets = [...FALLBACK_TICKERS];
            try {
                // Attempt to fetch dynamic data generated by GitHub Action
                const res = await fetch(`data/assets.json?v=${CACHE_BUST}`);
                const dynamicAssets = await res.json();
                if (dynamicAssets && dynamicAssets.length > 0) assets = dynamicAssets;
            } catch (e) {
                console.warn("Local env or missing backend data: Running in offline fallback mode.");
            }

            const list = document.getElementById('asset-list');
            list.innerHTML = assets.map((a, index) => {
                const priceHtml = a.price ? `<div class="price-val">${formatPrice(a.price)}</div>` : `<div style="font-size:0.75rem; color:var(--text-dim)">LIVE DATA</div>`;
                const changeHtml = a.price ? `<div class="change-pct ${a.change1d >= 0 ? 'positive' : 'negative'}">${a.change1d.toFixed(2)}%</div>` : ``;
                
                return `
                    <div class="asset-item ${a.ticker === currentTicker ? 'active' : ''}" 
                         id="item-${a.ticker}"
                         style="animation: slideIn 0.4s ease forwards; animation-delay: ${index * 0.04}s"
                         onclick="loadAsset('${a.ticker}')">
                        <div><span class="symbol">${a.ticker}</span></div>
                        <div style="text-align:right">
                            ${priceHtml}
                            ${changeHtml}
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function loadAsset(ticker) {
            currentTicker = ticker;
            document.querySelectorAll('.asset-item').forEach(i => i.classList.remove('active'));
            const el = document.getElementById(`item-${ticker}`);
            if (el) el.classList.add('active');
            
            try {
                // Fetch AI backend data context
                const res = await fetch(`data/${ticker}.json?v=${CACHE_BUST}`);
                currentAssetData = await res.json();
                
                document.getElementById('active-name').innerText = currentAssetData.name;
                document.getElementById('active-symbol-tag').innerText = currentAssetData.ticker;
            } catch (e) {
                currentAssetData = { name: FALLBACK_TICKERS.find(t => t.ticker === ticker)?.name || ticker, ticker: ticker };
                document.getElementById('active-name').innerText = currentAssetData.name;
                document.getElementById('active-symbol-tag').innerText = "Real-Time Tracking Active";
            }

            refreshMetricsUI();
            renderChart(ticker);
            document.getElementById('ai-chat').innerHTML = "Ready for insight processing.";
        }

        function refreshMetricsUI() {
            if(currentAssetData && currentAssetData.technical) {
                document.getElementById('m-sma20').innerText = currentAssetData.technical.SMA20 ? formatPrice(currentAssetData.technical.SMA20) : 'N/A';
                document.getElementById('m-sma50').innerText = currentAssetData.technical.SMA50 ? formatPrice(currentAssetData.technical.SMA50) : 'N/A';
                document.getElementById('m-1w').innerText = `${currentAssetData.performance['1w'].toFixed(2)}%`;
                document.getElementById('m-1y').innerText = `${currentAssetData.performance['1y'].toFixed(2)}%`;
                document.getElementById('m-1w').className = `metric-value ${currentAssetData.performance['1w'] >= 0 ? 'positive' : 'negative'}`;
                document.getElementById('m-1y').className = `metric-value ${currentAssetData.performance['1y'] >= 0 ? 'positive' : 'negative'}`;
            } else {
                document.getElementById('m-sma20').innerText = 'N/A';
                document.getElementById('m-sma50').innerText = 'N/A';
                document.getElementById('m-1w').innerText = 'N/A';
                document.getElementById('m-1y').innerText = 'N/A';
                document.getElementById('m-1w').className = `metric-value`;
                document.getElementById('m-1y').className = `metric-value`;
            }
        }

        function changeCurrency() {
            currentCurrency = document.getElementById('currency-selector').value;
            // Re-render sidebar prices
            loadAssetList();
            // Re-render metrics UI
            refreshMetricsUI();
            // Re-render tradingview chart with new currency
            renderChart(currentTicker);
        }

        function renderChart(ticker) {
            new TradingView.widget({
                "autosize": true,
                "symbol": getTvSymbol(ticker),
                "interval": "D",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                // Attempt to force currency on supported assets
                "currency": currentCurrency, 
                "enable_publishing": false,
                "backgroundColor": "#000000",
                "gridColor": "rgba(255, 255, 255, 0.03)",
                "hide_top_toolbar": false,
                "hide_legend": false,
                "save_image": false,
                "container_id": "chart-frame"
            });
        }

        // Search Filter
        document.getElementById('asset-search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            document.querySelectorAll('.asset-item').forEach(i => {
                i.style.display = i.innerText.toLowerCase().includes(val) ? 'flex' : 'none';
            });
        });

        // AI Modal Integration
        function showModal() { document.getElementById('api-modal').style.display = 'flex'; }
        function saveKey() {
            localStorage.setItem('openai_key', document.getElementById('api-key-input').value);
            document.getElementById('api-modal').style.display = 'none';
        }

        async function getAIReview() {
            const key = localStorage.getItem('openai_key');
            if (!key) return showModal();

            const chatBox = document.getElementById('ai-chat');
            chatBox.innerHTML = "<span style='color:var(--text-dim)'>Compiling market variables...</span>";

            try {
                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [{
                            role: "system",
                            content: `You are HORIZON, a concise structural market intelligence assistant. All analysis should be in the context of the user's selected currency (${currentCurrency}). Predict sentiment. Do not use markdown, keep it brief.`
                        }, {
                            role: "user",
                            content: `Analyze: ${JSON.stringify(currentAssetData || {})}`
                        }]
                    })
                });
                
                if (!response.ok) throw new Error("API request failed.");
                
                const result = await response.json();
                const text = result.choices[0].message.content;
                
                chatBox.innerHTML = "";
                let i = 0;
                let timer = setInterval(() => {
                    if (i < text.length) {
                        chatBox.innerHTML += text.charAt(i);
                        chatBox.scrollTop = chatBox.scrollHeight;
                        i++;
                    } else { clearInterval(timer); }
                }, 10);
            } catch (e) {
                chatBox.innerHTML = "<span style='color:var(--loss)'>Connection failed. Verify API Key validity.</span>";
            }
        }

        // Sequence Initialization
        window.addEventListener('DOMContentLoaded', async () => {
             if (localStorage.getItem('openai_key')) {
                 document.getElementById('api-key-input').value = localStorage.getItem('openai_key');
             }
             
             // 1. Fetch live currency rates (async)
             await fetchExchangeRates();
             
             // 2. Immediately load Gold chart & sidebar list
             renderChart(currentTicker);
             loadAssetList();
             
             // 3. Kick off fetching data context for gold in the background
             loadAsset(currentTicker);
        });
    </script>
</body>
</html>

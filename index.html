<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetalTrack Horizon | AI-Powered Market Command</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050608;
            --panel-glass: rgba(18, 22, 28, 0.7);
            --neon-gold: #f0b90b;
            --neon-cyan: #00f2ff;
            --text-main: #e0e6ed;
            --text-dim: #94a3b8;
            --gain: #00ff9d;
            --loss: #ff3b5c;
            --accent-glow: rgba(0, 242, 255, 0.2);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 50% 50%, #1a1e2e 0%, transparent 80%),
                linear-gradient(rgba(18, 22, 28, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 22, 28, 0.1) 1px, transparent 1px);
            background-size: 100% 100%, 50px 50px, 50px 50px;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Futuristic Sidebar */
        #left-sidebar {
            width: 320px;
            background: var(--panel-glass);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(0, 242, 255, 0.1);
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .brand {
            padding: 25px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--neon-gold), var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        #search-container { padding: 15px; }
        #asset-search {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(0, 242, 255, 0.2);
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s;
        }
        #asset-search:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px var(--accent-glow); }

        .asset-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .asset-item {
            padding: 15px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255,255,255,0.02);
            border: 1px solid transparent;
            display: flex;
            justify-content: space-between;
        }
        .asset-item:hover { background: rgba(0, 242, 255, 0.05); transform: translateX(5px); }
        .asset-item.active { 
            background: rgba(0, 242, 255, 0.1); 
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        .symbol { font-family: 'Orbitron'; font-weight: 700; color: var(--neon-cyan); }
        .price-val { font-weight: 600; }
        .change-pct { font-size: 0.8rem; margin-top: 4px; }

        /* Main Viewport */
        #main-viewport {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }

        .header-stats {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        #chart-frame {
            flex-grow: 1;
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }
        
        /* AI Assistant Sidebar */
        #ai-sidebar {
            width: 380px;
            background: var(--panel-glass);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(0, 242, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .panel-title {
            font-family: 'Orbitron';
            font-size: 1rem;
            margin-bottom: 20px;
            color: var(--neon-gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ai-chat-box {
            flex-grow: 1;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 15px;
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #d1d4dc;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .ai-input-group {
            margin-top: 15px;
            display: flex;
            gap: 8px;
        }

        .btn-neon {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Orbitron';
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        .btn-neon:hover { background: var(--neon-cyan); color: black; box-shadow: 0 0 20px var(--neon-cyan); }

        .settings-icon { cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .settings-icon:hover { opacity: 1; color: var(--neon-cyan); }

        /* Tech Metrics */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .metric-card {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .metric-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        .metric-value { font-family: 'Orbitron'; font-size: 0.9rem; }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 100;
            background: linear-gradient(0deg, rgba(0, 242, 255, 0.05) 0%, transparent 100%);
            position: absolute;
            bottom: 100%;
            animation: scan 8s linear infinite;
            pointer-events: none;
        }

        @keyframes scan { from { bottom: 100%; } to { bottom: -100px; } }
        
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: var(--sidebar-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--neon-cyan);
            width: 400px; text-align: center;
        }

        .positive { color: var(--gain); }
        .negative { color: var(--loss); }
    </style>
</head>
<body>

    <div class="scanline"></div>

    <!-- API Key Modal -->
    <div id="api-modal" class="modal">
        <div class="modal-content">
            <h3 style="font-family: 'Orbitron';">Enter OpenAI API Key</h3>
            <p style="font-size: 0.8rem; color: var(--text-dim);">Your key is stored locally in your browser only.</p>
            <input type="password" id="api-key-input" style="width: 100%; padding: 10px; margin: 15px 0; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff;">
            <button class="btn-neon" onclick="saveKey()">Save Access Key</button>
        </div>
    </div>

    <div id="left-sidebar">
        <div class="brand">HORIZON v2.0</div>
        <div id="search-container">
            <input type="text" id="asset-search" placeholder="SEARCH ASSETS...">
        </div>
        <div class="asset-list" id="asset-list"></div>
    </div>

    <div id="main-viewport">
        <div class="header-stats">
            <div>
                <div id="active-name" style="font-family: 'Orbitron'; font-size: 1.8rem; font-weight: 700;">SELECT ASSET</div>
                <div id="active-symbol-tag" style="color: var(--neon-cyan); font-weight: 600; letter-spacing: 1px;">-</div>
            </div>
            <div style="text-align: right;">
                <div id="current-price" style="font-size: 2.2rem; font-family: 'Orbitron';">$--</div>
                <div id="current-change" style="font-weight: 600;">--%</div>
            </div>
        </div>
        <div id="chart-frame"></div>
    </div>

    <div id="ai-sidebar">
        <div class="panel-title">
            <span>AI ANALYSIS</span>
            <span class="settings-icon" onclick="showModal()">⚙</span>
        </div>

        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-label">SMA 20</div>
                <div id="m-sma20" class="metric-value">-</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">SMA 50</div>
                <div id="m-sma50" class="metric-value">-</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">1W VOL</div>
                <div id="m-1w" class="metric-value">-</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">1Y TREND</div>
                <div id="m-1y" class="metric-value">-</div>
            </div>
        </div>

        <div id="ai-chat" class="ai-chat-box">
            System ready. Select a metal and click "Generate Review" to start AI analysis.
        </div>

        <div class="ai-input-group">
            <button class="btn-neon" style="width: 100%;" onclick="getAIReview()">Generate AI Review</button>
        </div>
    </div>

    <script>
        let chart, candleSeries, currentAssetData;

        function init() {
            const chartDiv = document.getElementById('chart-frame');
            chart = LightweightCharts.createChart(chartDiv, {
                layout: { backgroundColor: 'transparent', textColor: '#94a3b8' },
                grid: { vertLines: { color: 'rgba(255,255,255,0.03)' }, horzLines: { color: 'rgba(255,255,255,0.03)' } },
                rightPriceScale: { borderVisible: false, scaleMargins: { top: 0.1, bottom: 0.1 } },
                timeScale: { borderVisible: false },
            });
            candleSeries = chart.addCandlestickSeries({ upColor: '#00ff9d', downColor: '#ff3b5c', borderVisible: false, wickUpColor: '#00ff9d', wickDownColor: '#ff3b5c' });
            window.addEventListener('resize', () => chart.resize(chartDiv.clientWidth, chartDiv.clientHeight));
            loadAssetList();
        }

        async function loadAssetList() {
            const res = await fetch('data/assets.json');
            const assets = await res.json();
            const list = document.getElementById('asset-list');
            list.innerHTML = assets.map(a => `
                <div class="asset-item" onclick="loadAsset('${a.ticker}', this)">
                    <div><span class="symbol">${a.ticker}</span></div>
                    <div style="text-align:right">
                        <div class="price-val">$${a.price.toFixed(2)}</div>
                        <div class="change-pct ${a.change1d >= 0 ? 'positive' : 'negative'}">${a.change1d.toFixed(2)}%</div>
                    </div>
                </div>
            `).join('');
            if (assets.length > 0) loadAsset(assets[0].ticker, list.firstElementChild);
        }

        async function loadAsset(ticker, el) {
            document.querySelectorAll('.asset-item').forEach(i => i.classList.remove('active'));
            if (el) el.classList.add('active');
            
            const res = await fetch(`data/${ticker}.json`);
            currentAssetData = await res.json();
            
            document.getElementById('active-name').innerText = currentAssetData.name;
            document.getElementById('active-symbol-tag').innerText = currentAssetData.ticker;
            document.getElementById('current-price').innerText = `$${currentAssetData.currentPrice.toLocaleString()}`;
            
            const c = currentAssetData.performance['1d'];
            document.getElementById('current-change').innerText = `${c >= 0 ? '+' : ''}${c.toFixed(2)}%`;
            document.getElementById('current-change').className = c >= 0 ? 'positive' : 'negative';

            // Metrics
            document.getElementById('m-sma20').innerText = currentAssetData.technical.SMA20 ? `$${currentAssetData.technical.SMA20.toFixed(2)}` : 'N/A';
            document.getElementById('m-sma50').innerText = currentAssetData.technical.SMA50 ? `$${currentAssetData.technical.SMA50.toFixed(2)}` : 'N/A';
            document.getElementById('m-1w').innerText = `${currentAssetData.performance['1w'].toFixed(2)}%`;
            document.getElementById('m-1y').innerText = `${currentAssetData.performance['1y'].toFixed(2)}%`;

            candleSeries.setData(currentAssetData.history);
            chart.timeScale().fitContent();
        }

        function showModal() { document.getElementById('api-modal').style.display = 'flex'; }
        function saveKey() {
            localStorage.setItem('openai_key', document.getElementById('api-key-input').value);
            document.getElementById('api-modal').style.display = 'none';
        }

        async function getAIReview() {
            const key = localStorage.getItem('openai_key');
            if (!key) return showModal();

            const chatBox = document.getElementById('ai-chat');
            chatBox.innerHTML = "Initializing neural uplink... Analysis in progress.";

            try {
                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [{
                            role: "system",
                            content: "You are HORIZON AI, a high-end metal market analyst. Provide a concise, futuristic market review based on the provided JSON data."
                        }, {
                            role: "user",
                            content: `Analyze this asset: ${JSON.stringify({
                                name: currentAssetData.name,
                                price: currentAssetData.currentPrice,
                                performance: currentAssetData.performance,
                                indicators: currentAssetData.technical,
                                news: currentAssetData.cause
                            })}`
                        }]
                    })
                });
                const result = await response.json();
                const text = result.choices[0].message.content;
                
                // Typewriter effect
                chatBox.innerHTML = "";
                let i = 0;
                let timer = setInterval(() => {
                    if (i < text.length) {
                        chatBox.innerHTML += text.charAt(i);
                        chatBox.scrollTop = chatBox.scrollHeight;
                        i++;
                    } else { clearInterval(timer); }
                }, 15);
            } catch (e) {
                chatBox.innerHTML = "Error: Failed to connect to AI. Check your API key.";
            }
        }

        document.getElementById('asset-search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            document.querySelectorAll('.asset-item').forEach(i => {
                i.style.display = i.innerText.toLowerCase().includes(val) ? 'flex' : 'none';
            });
        });

        init();
    </script>
</body>
</html>
